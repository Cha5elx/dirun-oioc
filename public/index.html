<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有赞一物一码管理后台</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f7fa;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 { color: #409eff; margin-bottom: 20px; }
    p { color: #606266; margin-bottom: 10px; }
    code {
      background: #f5f7fa;
      padding: 2px 8px;
      border-radius: 4px;
      color: #e6a23c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>有赞一物一码管理后台</h1>
    <p>前端项目正在构建中...</p>
    <p>请运行以下命令构建前端：</p>
    <code>cd admin && npm install && npm run build</code>
  </div>
</body>
</html>
